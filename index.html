<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="UTF-8">
        <title>Trenton Soto's Extra Credit</title>

        <link href="reset.css" rel="stylesheet">
        <link href="style.css" rel="stylesheet">
    </head>

    <body>
        <div class="ec-title">INSPIRED BY XTIANMILLER</div>
        <div class="ec-toggle">
            <span class="light">Light</span>
            <input class="toggle-checkbox" type="checkbox" id="toggle">
            <span class="dark">Dark</span>
        </div>

        <main>
            <section>
                <span class="ec-label">I</span>
                <figure>

                    <div class="understanding">
                        <div class="short-word">
                            <div class="letter">UN</div>
                            <div class="words">TRUST IN THE LORD WITH ALL THINE HEART</div>
                        </div>
                        <div class="short-word">
                            <div class="letter">DERST</div>
                            <div class="words">AND HE SHALL DIRECT THY PATHS</div>
                        </div>
                        <div class="short-word">
                            <div class="letter">AN</div>
                            <div class="words">IN ALL THY WAYS ACKOWLEDGE HIM</div>
                        </div>
                        <div class="short-word">
                            <div class="letter">DING</div>
                            <div class="words">FEAR THE LORD, AND DEPART FROM EVIL</div>
                        </div>
                    </div>
                    <div class="not">NOT</div>
                    <div class="own">OWN</div>

                    <figcaption class="tombstone">Christian Miller (XTIANMILLER)<br>
                    <em>Off-Axis Form</em>, 2026<br>
                    <a href="https://www.instagram.com/xtianmiller/">@XTIANMILLER ON INSTAGRAM↗</a>
                    </figcaption>
                </figure>
            </section>

            <section>
                <span class="ec-label">II</span>
                <figure>

                    <div class="lines">
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </div>
                    <div class="circles">
                        <div class="circle-light"></div>
                        <div class="circle-light"></div>
                        <div class="circle-light"></div>
                        <div class="circle-light"></div>
                        <div class="circle-light"></div>
                        <div class="circle-dark"></div>
                        <div class="circle-dark"></div>
                        <div class="circle-dark"></div>
                        <div class="circle-dark"></div>
                        <div class="circle-dark"></div>
                        <div class="circle-dark"></div>
                        <div class="circle-dark"></div>
                        <div class="circle-dark"></div>
                    </div>
                    <div class="not">INTERPOLATION</div>
                    <div class="own">15 MAY 2026</div>

                    <figcaption class="tombstone">Christian Miller (XTIANMILLER)<br>
                    <em>Discernment in Frame</em>, 2020<br>
                    <a href="https://www.instagram.com/xtianmiller/">@XTIANMILLER ON INSTAGRAM↗</a>
                    </figcaption> 
                </figure>
            </section>
        </main>
    </body>
</html>
